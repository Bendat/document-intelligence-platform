services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: dip-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-document_intelligence}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-document_intelligence}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.4-alpine
    container_name: dip-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  azurite:
    image: mcr.microsoft.com/azure-storage/azurite:3.35.0
    container_name: dip-azurite
    command: azurite --blobHost 0.0.0.0 --location /data
    ports:
      - "10000:10000"
    volumes:
      - azurite_data:/data

  ollama:
    image: ${OLLAMA_IMAGE:-ollama/ollama:0.13.5}
    container_name: dip-ollama
    command: serve
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama_data:/root/.ollama

volumes:
  postgres_data:
  redis_data:
  azurite_data:
  ollama_data:
