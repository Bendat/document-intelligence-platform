name: Backend CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/document_intelligence_test
      POSTGRES_TEST_DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/document_intelligence_test
      PERSISTENCE_BACKEND: postgres
      AI_PROVIDER_BACKEND: deterministic

    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_DB: document_intelligence_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d document_intelligence_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --group dev

      - name: Validate Docker Compose config
        run: docker compose config

      - name: Check formatting and lint
        run: uv run ruff check .

      - name: Type check
        run: uv run mypy src

      - name: Verify Python compilation
        run: uv run python -m compileall src tests

      - name: Apply migrations
        run: uv run alembic upgrade head

      - name: Run tests
        run: uv run pytest
